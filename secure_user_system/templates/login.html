<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Logowanie</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color:white;
}

/* container */
.login-box{
    width:380px;
    padding:40px;
    border-radius:24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* title */
.login-box h1{
    font-size:24px;
    margin-bottom:25px;
    text-align:center;
}

/* inputs (Django form fields) */
form p{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(0,0,0,0.2);
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#6366f1;
    box-shadow:0 0 0 3px rgba(99,102,241,0.2);
}

/* button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#6366f1;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#4f46e5;
    transform:translateY(-1px);
}

/* helper text */
.helper{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}
</style>

</head>

<body>

<div class="login-box">

    <h1>🔐 Zaloguj się</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Zaloguj</button>
    </form>

    <div class="helper">
        Secure Admin Panel v1
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O autorze</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-blue-900 flex items-center justify-center p-6">

    <!-- Karta -->
    <div class="max-w-5xl w-full bg-white/10 backdrop-blur-xl border border-white/20 rounded-[32px] shadow-2xl overflow-hidden">

        <div class="grid md:grid-cols-2">

            <!-- Lewa strona -->
            <div class="flex flex-col items-center justify-center p-10 bg-white/5">

                <!-- Zdjęcie -->
                <div class="w-44 h-44 rounded-full border-4 border-white/40 bg-white/20 flex items-center justify-center mb-6 overflow-hidden">
                    <!-- Tutaj później możesz wstawić zdjęcie -->
                    <span class="text-7xl">👤</span>
                </div>

                <h1 class="text-4xl font-extrabold text-white text-center">
                    Łukasz Rychwalski
                </h1>

                <p class="mt-3 text-blue-200 text-center">
                    Python • Django • Web Development
                </p>

            </div>

            <!-- Prawa strona -->
            <div class="p-10 flex flex-col justify-center">

                <h2 class="text-3xl font-bold text-white mb-8">
                    Informacje
                </h2>

                <div class="space-y-5">

                    <div class="bg-white/10 rounded-2xl p-5">
                        <p class="text-blue-200 text-sm">
                            Numer indeksu
                        </p>
                        <p class="text-white text-xl font-semibold">
                            171133
                        </p>
                    </div>

                    <div class="bg-white/10 rounded-2xl p-5">
                        <p class="text-blue-200 text-sm">
                            Kierunek studiów
                        </p>
                        <p class="text-white text-xl font-semibold">
                            Informatyka
                        </p>
                    </div>

                    <div class="bg-white/10 rounded-2xl p-5">
                        <p class="text-blue-200 text-sm">
                            Przedmiot
                        </p>
                        <p class="text-white text-xl font-semibold">
                            Bezpieczeństwo Aplikacji Webowych
                        </p>
                    </div>

                </div>

                <a href="/"
                   class="mt-8 inline-flex justify-center items-center px-8 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-all">
                    Powrót do strony głównej
                </a>

            </div>

        </div>

    </div>

</body>
</html>
